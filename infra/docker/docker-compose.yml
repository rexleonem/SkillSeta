services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: skillseta
      POSTGRES_USER: skillseta
      POSTGRES_PASSWORD: skillseta
    ports:
      - "5432:5432"
    volumes:
      - skillseta_pgdata:/var/lib/postgresql/data

  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    env_file:
      - ../../.env
    depends_on:
      - postgres
    ports:
      - "4000:4000"

  ai-service:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.ai
    env_file:
      - ../../.env
    depends_on:
      - postgres
    ports:
      - "4100:4100"

  web:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.web
    env_file:
      - ../../.env
    depends_on:
      - api
      - ai-service
    ports:
      - "3000:3000"

  admin:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.admin
    env_file:
      - ../../.env
    depends_on:
      - api
    ports:
      - "3001:3001"

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
      - api
      - ai-service
      - admin
    ports:
      - "80:80"

volumes:
  skillseta_pgdata:
